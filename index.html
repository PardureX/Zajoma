        .avatar-option {

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyC4-_JQsS625vRMkmM4PeVupxX97FVBe5U",
    authDomain: "zajoma-8553f.firebaseapp.com",
    projectId: "zajoma-8553f",
    storageBucket: "zajoma-8553f.firebasestorage.app",
    messagingSenderId: "390203043975",
    appId: "1:390203043975:web:fe5e2f618ee285ce3bc822"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Colores fijos para avatares
const COLORES_AVATAR = [
    "#E57373","#F06292","#BA68C8","#7986CB","#4FC3F7","#4DB6AC","#81C784","#FFD54F","#FF8A65","#90A4AE",
    "#F48FB1","#CE93D8","#9FA8DA","#80DEEA","#80CBC4","#A5D6A7","#FFF176","#FFCC80","#FFAB91","#B0BEC5",
    "#EF9A9A","#F48FB1","#E040FB","#448AFF","#00BCD4","#009688","#4CAF50","#FFEB3B","#FF5722"
];

const avatares = [];
for (let i = 1; i <= 29; i++) {
    avatares.push({ img: `avatars/avatar${i}.png`, color: COLORES_AVATAR[i - 1] || "#a855f7" });
}

let avatarSeleccionado = 0;
let fotoPersonalizada = null; // Guardar la foto comprimida si el usuario sube una

function cargarAvatares() {
    const container = document.getElementById('avatarSelector');
    container.innerHTML = '';
    for (let i = 0; i < avatares.length; i++) {
        const img = document.createElement('img');
        img.src = avatares[i].img;
        img.className = 'avatar-option' + (i === avatarSeleccionado ? ' selected' : '');
        img.onclick = (function(idx) { return function() { seleccionarAvatar(idx, null); }; })(i);
        img.onerror = function() { this.src = `https://api.dicebear.com/7.x/thumbs/svg?seed=${i}`; };
        container.appendChild(img);
    }
}

window.seleccionarAvatar = (idx, fotoBase64 = null) => {
    avatarSeleccionado = idx;
    if (fotoBase64) {
        fotoPersonalizada = fotoBase64;
        // Mostrar la previsualizacičīļn
        const preview = document.getElementById('fotoPreview');
        if (preview) {
            preview.src = fotoBase64;
            preview.style.display = 'block';
        }
    } else {
        fotoPersonalizada = null;
        const preview = document.getElementById('fotoPreview');
        if (preview) preview.style.display = 'none';
    }
    document.querySelectorAll('.avatar-option').forEach((el, i) => el.classList.toggle('selected', i === idx));
};

function mostrarError(msg) {
    const el = document.getElementById('errorMsg');
    el.innerHTML = 'éŋįįŽ ' + msg;
    setTimeout(() => el.innerHTML = '', 4000);
}

window.mostrarRegistro = () => {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('registerPanel').style.display = 'block';
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('tabReg').classList.add('active');
    cargarAvatares();
    fotoPersonalizada = null;
    const preview = document.getElementById('fotoPreview');
    if (preview) preview.style.display = 'none';
};

window.mostrarLogin = () => {
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('registerPanel').style.display = 'none';
    document.getElementById('tabLogin').classList.add('active');
    document.getElementById('tabReg').classList.remove('active');
};

// éđâŽéđâŽ COMPRESIčŦN DE IMAGEN éđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽéđâŽ
async function comprimirImagen(file, maxWidth = 200, maxHeight = 200, quality = 0.5) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                let width = img.width;
                let height = img.height;
                
                // Mantener proporcičīļn
                if (width > height) {
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width = (width * maxHeight) / height;
                        height = maxHeight;
                    }
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const base64 = canvas.toDataURL('image/jpeg', quality);
                resolve(base64);
            };
            img.onerror = reject;
            img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
    });
}

// Subir foto propia
function iniciarSubidaFoto() {
    const input = document.getElementById('inputFoto');
    input.click();
    
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (!file.type.startsWith('image/')) {
            mostrarError('é?Solo se permiten imč°Đgenes');
            return;
        }
        
        mostrarError('éĶæģ Comprimiendo imagen...');
        
        try {
            const imagenComprimida = await comprimirImagen(file, 200, 200, 0.5);
            // Usar un éndice especial (-1) para indicar que es foto personalizada
            seleccionarAvatar(-1, imagenComprimida);
            mostrarError('é?Foto lista para usar');
        } catch (error) {
            console.error('Error al procesar imagen:', error);
            mostrarError('é?Error al procesar la imagen');
        }
    };
}

window.registrarUsuario = async () => {
    const nombre = document.getElementById('regNombre').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    
    if (!nombre || !email || !password) { mostrarError('Completa todos los campos'); return; }
    if (password.length < 6) { mostrarError('La contraseåļ―a debe tener al menos 6 caracteres'); return; }
    
    // Determinar quč imagen usar
    let avatarImg;
    let avatarColor;
    
    if (fotoPersonalizada) {
        avatarImg = fotoPersonalizada;
        avatarColor = "#a855f7"; // Color por defecto para fotos personalizadas
    } else if (avatarSeleccionado >= 0 && avatares[avatarSeleccionado]) {
        avatarImg = avatares[avatarSeleccionado].img;
        avatarColor = avatares[avatarSeleccionado].color;
    } else {
        avatarImg = avatares[0].img;
        avatarColor = avatares[0].color;
    }
    
    try {
        const user = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'usuarios', user.user.uid), {
            nombre, email, uid: user.user.uid,
            avatarImg: avatarImg,
            avatarColor: avatarColor,
            online: true, 
            fondoChat: '#1a0533',
            esFotoPersonalizada: !!fotoPersonalizada
        });
        window.location.href = 'chat.html';
    } catch (error) { 
        let msg = error.message;
        if (msg.includes('email-already-in-use')) msg = 'Este correo ya estč°Đ registrado';
        else if (msg.includes('weak-password')) msg = 'Contraseåļ―a muy dčbil, ménimo 6 caracteres';
        mostrarError(msg); 
    }
};

window.iniciarSesion = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { mostrarError('Ingresa email y contraseåļ―a'); return; }
    try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'chat.html';
    } catch (error) { 
        let msg = error.message;
        if (msg.includes('invalid-credential')) msg = 'Correo o contraseåļ―a incorrectos';
        mostrarError(msg); 
    }
};

// Event listener para el botčīļn subir foto
document.getElementById('subirFotoBtn')?.addEventListener('click', iniciarSubidaFoto);
</script>
